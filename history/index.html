    function groupByDate(txns) {
      const m = {};
      txns.forEach(t => {
        if (!m[t.date]) m[t.date] = [];
        m[t.date].push(t);
      });
      return Object.entries(m).sort((a,b) => b[0].localeCompare(a[0]));
    }
    function relDate(ds) {
      const diff = Math.round((new Date("2026-04-27") - new Date(ds)) / 86400000);
      if (diff===0) return "今日";
      if (diff===1) return "昨日";
      return new Date(ds+"T00:00:00").toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"long"});
    }
    function fmtAmt(t) {
      if (t.amount===0) return `${t.pts>0?"+":""}${t.pts} pt`;

    }

      },[]);

      // Shared helpers
      const MONTHS_JP = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
      const DOW_JP    = ["日","月","火","水","木","金","土"];
      const txDates   = new Set(TX.map(t=>t.date));
      function pad(n){ return String(n).padStart(2,"0"); }

      // Dynamic week strip from weekStart
      const weekDays = useMemo(()=>Array.from({length:7},(_,i)=>{
        const d=new Date(weekStart); d.setDate(d.getDate()+i);
        const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        return {day:DOW_JP[d.getDay()],date:String(d.getDate()),ds,spend:spendByDate[ds]||0};
      }),[weekStart,spendByDate]);
      const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+6);
      const maxSpend   = Math.max(...weekDays.map(w=>w.spend),1);
      const weekLabel  = `${weekStart.getMonth()+1}月${weekStart.getDate()}日 – ${weekEnd.getMonth()+1}月${weekEnd.getDate()}日`;
      function shiftWeek(dir){ setWeekStart(d=>{const n=new Date(d);n.setDate(n.getDate()+dir*7);return n;}); }

      // Calendar grid from calYear/calMon
      const firstDOW  = new Date(calYear, calMon, 1).getDay();
      const daysInMon = new Date(calYear, calMon+1, 0).getDate();
      const calCells  = [...Array(firstDOW).fill(null), ...Array.from({length:daysInMon},(_,i)=>i+1)];
      function toDS(d){ return `${calYear}-${pad(calMon+1)}-${pad(d)}`; }
      function prevMon(){ if(calMon===0){setCalYear(y=>y-1);setCalMon(11);}else setCalMon(m=>m-1); }
      function nextMon(){ if(calMon===11){setCalYear(y=>y+1);setCalMon(0);}else setCalMon(m=>m+1); }

      // Toggle calendar — sync month to current week on open
      function toggleCal(){
        if(!calOpen){ setCalYear(weekStart.getFullYear()); setCalMon(weekStart.getMonth()); }
        setCalOpen(o=>!o);
      }

      // Swipe detection (touch + mouse)
      function onSwipeStart(e){ swipeRef.current = e.touches?.[0]?.clientX ?? e.clientX; }
      function onSwipeEnd(e, onLeft, onRight){
        if(swipeRef.current===null) return;
        const x = e.changedTouches?.[0]?.clientX ?? e.clientX;
        const delta = x - swipeRef.current;
        if(Math.abs(delta)>40){ delta<0 ? onLeft() : onRight(); }
        swipeRef.current = null;
      }

      return (
        <div style={{background:B.bg,minHeight:"100%",paddingBottom:100}}>

          {/* Card selector + Export */}
          <div style={{background:B.surface,borderBottom:`1px solid ${B.line}`,padding:"12px 16px"}}>
            <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
              <button onClick={()=>setCS(true)} style={{
                flex:1,display:"flex",alignItems:"center",gap:12,
                padding:"10px 14px",borderRadius:16,border:"none",
                background:B.surface,boxShadow:S.md,textAlign:"left",
              }}>
                <div style={{width:40,height:40,borderRadius:10,background:B.greenTint,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <CreditCard size={18} color={B.green} strokeWidth={2}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,color:B.silver,fontWeight:500,letterSpacing:.3}}>{cardData.name} ···{cardData.last}</div>
                  <div style={{fontSize:22,fontWeight:700,color:B.ink,letterSpacing:-.8,lineHeight:1.2}}>¥{cardData.balance.toLocaleString()}</div>
                </div>
                <ChevronDown size={18} color={B.silver} strokeWidth={2}/>
              </button>
              <button onClick={()=>setEx(true)} style={{
                flexShrink:0,borderRadius:12,border:"none",
                background:exportOpen?B.green:B.surface,boxShadow:S.md,
                display:"flex",alignItems:"center",justifyContent:"center",
                padding:"0 16px",transition:"all 0.18s",
              }}>
                <Upload size={16} color={exportOpen?"#fff":B.inkLight} strokeWidth={2}/>
              </button>
            </div>
          </div>

          {/* Week strip / Calendar */}
          <div style={{background:B.surface,borderBottom:`1px solid ${B.line}`}}>

            {/* Header row — tap to toggle */}
            <div onClick={toggleCal} style={{padding:"10px 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
              <span style={{fontSize:11,fontWeight:500,color:B.inkLight,letterSpacing:.3}}>
                {calOpen ? `${calYear}年${MONTHS_JP[calMon]}` : weekLabel}
              </span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {selDay&&!calOpen&&(
                  <button onClick={e=>{e.stopPropagation();setSelDay(null);}} style={{display:"flex",alignItems:"center",gap:3,background:"none",border:"none",color:B.silver,fontSize:11}}>
                    <X size={11}/> クリア
                  </button>
                )}
                {calOpen ? <ChevronUp size={14} color={B.silver} strokeWidth={2}/> : <ChevronDown size={14} color={B.silver} strokeWidth={2}/>}
              </div>
            </div>

            {/* Collapsed: week bar strip — swipeable */}
            {!calOpen&&(
              <div
                onTouchStart={onSwipeStart}
                onTouchEnd={e=>onSwipeEnd(e,()=>shiftWeek(1),()=>shiftWeek(-1))}
                onMouseDown={onSwipeStart}
                onMouseUp={e=>onSwipeEnd(e,()=>shiftWeek(1),()=>shiftWeek(-1))}
                style={{display:"flex",gap:4,padding:"0 16px",userSelect:"none"}}
              >
                {weekDays.map(w=>{
                  const sel=selDay===w.ds, isToday=w.ds==="2026-04-27";
                  const barH=Math.max(4,(w.spend/maxSpend)*32);
                  return (
                    <button key={w.ds} onClick={()=>setSelDay(sel?null:w.ds)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",padding:"0 0 10px"}}>
                      <div style={{width:"100%",height:36,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                        <div style={{width:"70%",borderRadius:"3px 3px 0 0",height:barH,background:sel?B.green:isToday?B.greenBorder:B.line,transition:"all 0.18s"}}/>
                      </div>
                      <span style={{fontSize:9,color:sel?B.green:B.silver,fontWeight:500,height:10,lineHeight:"10px"}}>{sel&&w.spend>0?`¥${(w.spend/1000).toFixed(1)}k`:""}</span>
                      <span style={{fontSize:11,color:sel?B.green:isToday?B.ink:B.silver,fontWeight:sel||isToday?600:400}}>{w.day}</span>
                      <div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:sel?B.green:isToday?B.raised:"transparent",transition:"all 0.18s"}}>
                        <span style={{fontSize:11,fontWeight:700,color:sel?"#fff":isToday?B.ink:B.silver}}>{w.date}</span>
                      </div>
                      <div style={{width:4,height:4,borderRadius:"50%",background:w.spend>0?(sel?"#fff":B.greenBorder):"transparent"}}/>
                    </button>
                  );
                })}
              </div>
            )}

            {/* Expanded: full month calendar — swipeable */}
            {calOpen&&(
              <div
                onTouchStart={onSwipeStart}
                onTouchEnd={e=>onSwipeEnd(e,nextMon,prevMon)}
                onMouseDown={onSwipeStart}
                onMouseUp={e=>onSwipeEnd(e,nextMon,prevMon)}
                style={{padding:"0 16px 14px",userSelect:"none"}}
              >
                {/* Month navigator */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <button onClick={e=>{e.stopPropagation();prevMon();}} style={{width:32,height:32,borderRadius:8,border:"none",background:B.raised,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <ChevronLeft size={16} color={B.inkLight} strokeWidth={2}/>
                  </button>
                  <span style={{fontSize:14,fontWeight:600,color:B.ink}}>{calYear}年{MONTHS_JP[calMon]}</span>
                  <button onClick={e=>{e.stopPropagation();nextMon();}} style={{width:32,height:32,borderRadius:8,border:"none",background:B.raised,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <ChevronRight size={16} color={B.inkLight} strokeWidth={2}/>
                  </button>
                </div>
                {/* Day-of-week headers */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:2}}>
                  {DOW_JP.map((d,i)=>(
                    <div key={d} style={{textAlign:"center",fontSize:10,fontWeight:500,padding:"3px 0",color:i===0?"#E15B5D":i===6?B.blue:B.silver}}>{d}</div>
                  ))}
                </div>
                {/* Day cells */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                  {calCells.map((d,i)=>{
                    if (!d) return <div key={i}/>;
                    const ds=toDS(d);
                    const hasTx=txDates.has(ds);
                    const isSel=selDay===ds;
                    const isToday=ds==="2026-04-27";
                    const dow=i%7;
                    const textCol=isSel?"#fff":isToday?B.green:dow===0?"#E15B5D":dow===6?B.blue:B.ink;
                    return (
                      <button key={i} onClick={e=>{e.stopPropagation();setSelDay(isSel?null:ds);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"3px 0",background:"none",border:"none"}}>
                        <div style={{width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:isSel?B.green:isToday?B.greenTint:"transparent",border:isToday&&!isSel?`1.5px solid ${B.green}`:"1.5px solid transparent",transition:"all 0.15s"}}>
                          <span style={{fontSize:12,fontWeight:isSel||isToday?700:400,color:textCol,lineHeight:1}}>{d}</span>
                        </div>
                        <div style={{width:4,height:4,borderRadius:"50%",background:hasTx?(isSel?"#fff":B.green):"transparent"}}/>
                      </button>
                    );
                  })}
                </div>
                {/* Clear button */}
                {selDay&&(
                  <button onClick={e=>{e.stopPropagation();setSelDay(null);}} style={{width:"100%",marginTop:10,padding:"8px",background:B.raised,border:"none",borderRadius:8,fontSize:12,color:B.inkLight,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                    <X size={12} strokeWidth={2}/> 選択を解除
                  </button>
                )}
              </div>
            )}
          </div>

          {/* Type filter */}
          <div style={{background:B.surface,padding:"10px 16px",borderBottom:`1px solid ${B.line}`}}>
            <div className="filter-scroll" style={{display:"flex",gap:6,overflowX:"auto"}}>
              {[["all","すべて"],["transport","交通"],["purchase","お買い物"],["jre","ポイント"],["tappay","Tappay"]].map(([k,l])=>(
                <button key={k} onClick={()=>setTypeF(k)} style={{padding:"8px 16px",borderRadius:24,border:"none",fontSize:13,fontWeight:500,flexShrink:0,transition:"all 0.15s",background:typeF===k?B.green:B.raised,color:typeF===k?"#fff":B.inkLight}}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:B.silver}}>{selDay?new Date(selDay+"T00:00:00").toLocaleDateString("ja-JP",{month:"long",day:"numeric"}):"2026年4月"} · {filtered.length}件</span>
            <span style={{fontSize:13,fontWeight:600,color:B.ink}}>¥{totalSpent.toLocaleString()} 利用</span>
          </div>

          <div style={{padding:"0 16px"}}>
            {grouped.length===0&&<div style={{textAlign:"center",padding:48,color:B.silver,fontSize:13}}>取引なし</div>}
            {grouped.map(([date,txns])=>(
              <div key={date} style={{marginBottom:4}}>
                <div style={{fontSize:11,fontWeight:500,color:B.silver,padding:"12px 2px 6px",letterSpacing:.4,textTransform:"uppercase"}}>{relDate(date)}</div>
                <div style={{background:B.surface,borderRadius:16,overflow:"hidden",border:`1px solid ${B.line}`,boxShadow:S.xs}}>
                  {txns.map((t,i)=>{
                    const {Icon,color,tint}=TYPE_CFG[t.type];
                    return (
                      <div key={t.id} style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:12,borderBottom:i<txns.length-1?`1px solid ${B.line}`:"none"}}>
                        <div style={{width:40,height:40,borderRadius:12,background:tint,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon size={18} color={color} strokeWidth={1.8}/></div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:15,fontWeight:600,color:B.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.label}</div>
                          <div style={{fontSize:11,color:B.silver,marginTop:2,display:"flex",alignItems:"center",gap:4}}><Clock size={10} color={B.silver}/> {t.time} · {t.sub}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:15,fontWeight:600,color:amtColor(t)}}>{fmtAmt(t)}</div>
                          <div style={{fontSize:11,color:B.silver,marginTop:2}}>¥{t.bal.toLocaleString()}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
          <CardPickerSheet open={cardSheet} onClose={()=>setCS(false)} card={card} setCard={setCard}/>
          <ExportSheet open={exportOpen} onClose={()=>setEx(false)}/>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // V2 — INSIGHTS
    // ═══════════════════════════════════════════════════════════════════════════
    function V2() {
      const [card,setCard]     = useState(1);
      const [period,setPer]    = useState("week");
      const [typeF,setTypeF]   = useState("all");
      const [exportOpen,setEx] = useState(false);
      const [cardSheet,setCS]  = useState(false);
      const [tab,setTab]       = useState("insights");

      const cardData = CARDS.find(c=>c.id===card);

      // Period filtering
      const PERIOD_FROM   = {today:"2026-04-27", week:"2026-04-21", month:"2026-04-01", "3m":"2026-02-01"};
      const PERIOD_LABELS = {today:"今日", week:"今週", month:"今月", "3m":"3ヶ月"};
      const PERIOD_DATE_LABELS = {today:"2026年4月27日", week:"4月21日 – 27日", month:"2026年4月", "3m":"2月 – 4月"};
      const periodTX = TX.filter(t=>t.date>=PERIOD_FROM[period]);
      const filtered  = periodTX.filter(t=>typeF==="all"||t.type===typeF);
      const grouped   = groupByDate(filtered);
      const spent     = Math.abs(periodTX.filter(t=>t.amount<0).reduce((a,t)=>a+t.amount,0));
      const income    = periodTX.filter(t=>t.amount>0).reduce((a,t)=>a+t.amount,0);
      const pts       = periodTX.reduce((a,t)=>a+t.pts,0);
      const txCount   = periodTX.length;

      // Category donut for period
      const byType   = Object.entries(TYPE_CFG).map(([k,cfg])=>({key:k,...cfg,total:Math.abs(periodTX.filter(t=>t.type===k&&t.amount<0).reduce((a,t)=>a+t.amount,0))}));
      const typeTotal= byType.reduce((a,b)=>a+b.total,0)||1;
      const maxType  = Math.max(...byType.map(b=>b.total),1);

      // Sparkline for period
      const balPts = periodTX.slice(0,8).reverse().map(t=>t.bal);
      const minB=Math.min(...balPts,0), maxB=Math.max(...balPts,1);
      const SW=260, SH=44;
      const toSY=(v,h)=>h-((v-minB)/(maxB-minB||1))*h;
      const sparkPts=balPts.length>1?balPts.map((v,i)=>`${(i/(balPts.length-1))*SW},${toSY(v,SH)}`).join(" "):`0,${SH/2} ${SW},${SH/2}`;

      // Bar chart — adapts granularity to period
      let barData=[], barLabel="";
      if(period==="today"){
        barLabel="時間帯別支出 · 今日";
        barData=[
          {label:"朝",   spend:Math.abs(periodTX.filter(t=>t.amount<0&&parseInt(t.time)<12).reduce((a,t)=>a+t.amount,0))},
          {label:"昼",   spend:Math.abs(periodTX.filter(t=>t.amount<0&&parseInt(t.time)>=12&&parseInt(t.time)<15).reduce((a,t)=>a+t.amount,0))},
          {label:"午後", spend:Math.abs(periodTX.filter(t=>t.amount<0&&parseInt(t.time)>=15&&parseInt(t.time)<18).reduce((a,t)=>a+t.amount,0))},
          {label:"夜",   spend:Math.abs(periodTX.filter(t=>t.amount<0&&parseInt(t.time)>=18).reduce((a,t)=>a+t.amount,0))},
        ];
      } else if(period==="week"){
        barLabel="日別支出 · 今週";
        const DOW=["日","月","火","水","木","金","土"];
        barData=["2026-04-21","2026-04-22","2026-04-23","2026-04-24","2026-04-25","2026-04-26","2026-04-27"].map(ds=>({
          label:DOW[new Date(ds+"T00:00:00").getDay()], ds,
          spend:Math.abs(TX.filter(t=>t.date===ds&&t.amount<0).reduce((a,t)=>a+t.amount,0)),
        }));
      } else if(period==="month"){
        barLabel="週別支出 · 今月";
        barData=[
          {label:"第1週",spend:Math.abs(TX.filter(t=>t.date>="2026-04-01"&&t.date<="2026-04-07"&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
          {label:"第2週",spend:Math.abs(TX.filter(t=>t.date>="2026-04-08"&&t.date<="2026-04-14"&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
          {label:"第3週",spend:Math.abs(TX.filter(t=>t.date>="2026-04-15"&&t.date<="2026-04-21"&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
          {label:"第4週",spend:Math.abs(TX.filter(t=>t.date>="2026-04-22"&&t.date<="2026-04-27"&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
        ];
      } else {
        barLabel="月別支出 · 3ヶ月";
        barData=[
          {label:"2月",spend:Math.abs(TX.filter(t=>t.date.startsWith("2026-02")&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
          {label:"3月",spend:Math.abs(TX.filter(t=>t.date.startsWith("2026-03")&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
          {label:"4月",spend:Math.abs(TX.filter(t=>t.date.startsWith("2026-04")&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
        ];
      }
      const maxBar=Math.max(...barData.map(b=>b.spend),1);

      // Monthly trend — computed from real TX data
      const monthlyData=[
        {m:"11月",v:8200},{m:"12月",v:11400},{m:"1月",v:7100},
        {m:"2月",v:Math.abs(TX.filter(t=>t.date.startsWith("2026-02")&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
        {m:"3月",v:Math.abs(TX.filter(t=>t.date.startsWith("2026-03")&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
        {m:"4月",v:Math.abs(TX.filter(t=>t.date.startsWith("2026-04")&&t.amount<0).reduce((a,t)=>a+t.amount,0))},
      ];
      const maxMonth=Math.max(...monthlyData.map(m=>m.v),1);

      return (
        <div style={{background:B.bg,minHeight:"100%",paddingBottom:100}}>

          {/* Hero */}
          <div style={{background:`linear-gradient(150deg,${B.greenDark} 0%,${B.green} 100%)`,padding:"20px 20px 24px"}}>
            <div style={{display:"flex",gap:8,alignItems:"stretch",marginBottom:20}}>
              <button onClick={()=>setCS(true)} style={{
                flex:1,display:"flex",alignItems:"center",gap:10,
                padding:"10px 14px",borderRadius:16,border:"none",
                background:"rgba(255,255,255,.15)",textAlign:"left",
              }}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.7)",fontWeight:500,letterSpacing:.4,marginBottom:3}}>{cardData.name} ···{cardData.last}</div>
                  <div style={{fontSize:20,fontWeight:700,color:"#fff",letterSpacing:-.6}}>¥{cardData.balance.toLocaleString()}</div>
                </div>
                <ChevronDown size={16} color="rgba(255,255,255,.6)" strokeWidth={2}/>
              </button>
              <button onClick={()=>setEx(true)} style={{
                flexShrink:0,borderRadius:12,border:"none",
                background:exportOpen?"rgba(255,255,255,.96)":"rgba(255,255,255,.15)",
                display:"flex",alignItems:"center",justifyContent:"center",
                padding:"0 16px",transition:"all 0.18s",
              }}>
                <Upload size={16} color={exportOpen?B.green:"rgba(255,255,255,.85)"} strokeWidth={2}/>
              </button>
            </div>
            <div style={{background:"rgba(0,0,0,.18)",borderRadius:8,padding:3,display:"flex",gap:2,marginBottom:20}}>
              {[["today","今日"],["week","今週"],["month","今月"],["3m","3ヶ月"]].map(([k,l])=>(
                <button key={k} onClick={()=>setPer(k)} style={{flex:1,padding:"6px 4px",borderRadius:6,border:"none",background:period===k?"rgba(255,255,255,.96)":"transparent",color:period===k?B.green:"rgba(255,255,255,.6)",fontSize:11,fontWeight:period===k?600:400,transition:"all 0.18s"}}>{l}</button>
              ))}
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.6)",fontWeight:500,letterSpacing:.4,marginBottom:4}}>{PERIOD_LABELS[period]}の支出合計</div>
            <div style={{fontSize:34,fontWeight:700,color:"#fff",letterSpacing:-1,lineHeight:1}}>¥{spent.toLocaleString()}</div>
            <div style={{display:"flex",alignItems:"center",gap:4,marginTop:6}}>
              <TrendingDown size={13} color="rgba(255,255,255,.6)"/>
              <span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>¥{income.toLocaleString()} 受け取り · {pts}pt 獲得</span>
            </div>
          </div>

          {/* Tab bar */}
          <div style={{background:B.surface,borderBottom:`1px solid ${B.line}`,display:"flex",position:"sticky",top:0,zIndex:50}}>
            {[["insights","分析"],["transactions","明細"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{
                flex:1,padding:"13px 0",border:"none",background:"none",
                borderBottom:tab===k?`2px solid ${B.green}`:"2px solid transparent",
                marginBottom:-1,
                color:tab===k?B.green:B.silver,fontSize:13,fontWeight:tab===k?600:400,
                transition:"all 0.15s",
              }}>{l}</button>
            ))}
          </div>

          {tab==="insights"&&(
            <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>

              {/* KPI tiles */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[{label:"取引件数",value:txCount,sub:PERIOD_LABELS[period],Icon:List,color:B.blue},{label:"JREポイント",value:`+${pts}`,sub:"獲得",Icon:Star,color:B.amber}].map(({label,value,sub,Icon,color})=>(
                  <div key={label} style={{background:B.surface,borderRadius:16,padding:"14px 16px",border:`1px solid ${B.line}`,boxShadow:S.xs}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <span style={{fontSize:11,color:B.silver,fontWeight:400}}>{label}</span>
                      <Icon size={15} color={color} strokeWidth={1.8}/>
                    </div>
                    <div style={{fontSize:28,fontWeight:700,color:B.ink,letterSpacing:-.5,lineHeight:1}}>{value}</div>
                    <div style={{fontSize:11,color:B.silver,marginTop:4}}>{sub}</div>
                  </div>
                ))}
              </div>

              {/* Sparkline */}
              <div style={{background:B.surface,borderRadius:16,padding:"16px 18px",border:`1px solid ${B.line}`,boxShadow:S.xs}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:B.ink}}>残高推移</div>
                    <div style={{fontSize:11,color:B.silver,marginTop:2}}>直近8件の取引</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:20,fontWeight:700,color:B.ink}}>¥{cardData.balance.toLocaleString()}</div>
                    <div style={{fontSize:11,color:B.green,fontWeight:500,display:"flex",alignItems:"center",gap:2,justifyContent:"flex-end"}}><TrendingUp size={11}/> 現在</div>
                  </div>
                </div>
                <svg width="100%" viewBox={`0 0 ${SW} ${SH+6}`} style={{height:54,overflow:"visible"}} preserveAspectRatio="none">
                  <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={B.green} stopOpacity=".16"/><stop offset="100%" stopColor={B.green} stopOpacity="0"/></linearGradient></defs>
                  <polygon points={`0,${SH} ${sparkPts} ${SW},${SH}`} fill="url(#sg)"/>
                  <polyline points={sparkPts} fill="none" stroke={B.green} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  {balPts.map((v,i)=>(<circle key={i} cx={(i/(balPts.length-1))*SW} cy={toSY(v,SH)} r="3" fill="#fff" stroke={B.green} strokeWidth="1.8"/>))}
                </svg>
              </div>

              {/* Daily bars */}
              <div style={{background:B.surface,borderRadius:16,padding:"16px 18px",border:`1px solid ${B.line}`,boxShadow:S.xs}}>
                <div style={{fontSize:13,fontWeight:600,color:B.ink,marginBottom:14}}>{barLabel}</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
                  {barData.map((b,i)=>{const h=Math.max(4,(b.spend/maxBar)*64),isCur=period==="week"?b.ds==="2026-04-27":i===barData.length-1;return(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      <span style={{fontSize:9,color:isCur?B.green:"transparent",fontWeight:600}}>{isCur&&b.spend>0?`¥${(b.spend/1000).toFixed(1)}k`:"·"}</span>
                      <div style={{width:"100%",borderRadius:"4px 4px 0 0",height:h,background:isCur?B.green:B.greenBorder,transition:"height 0.4s"}}/>
                      <span style={{fontSize:9,color:isCur?B.ink:B.silver,fontWeight:isCur?600:400}}>{b.label}</span>
                    </div>
                  );})}
                </div>
              </div>

              {/* Donut */}
              <div style={{background:B.surface,borderRadius:16,padding:"16px 18px",border:`1px solid ${B.line}`,boxShadow:S.xs}}>
                <div style={{fontSize:13,fontWeight:600,color:B.ink,marginBottom:4}}>カテゴリ別内訳</div>
                <div style={{fontSize:11,color:B.silver,marginBottom:14}}>{PERIOD_DATE_LABELS[period]}</div>
                {(()=>{
                  const R=54,CX=70,CY=70,stroke=18,circ=2*Math.PI*R;
                  let off=0;
                  const slices=byType.filter(b=>b.total>0).map(b=>{const dash=(b.total/typeTotal)*circ,s={...b,dash,off};off+=dash;return s;});
                  return (
                    <div style={{display:"flex",gap:16,alignItems:"center"}}>
                      <svg width={140} height={140} viewBox="0 0 140 140" style={{flexShrink:0}}>
                        {slices.map((s,i)=>(<circle key={i} cx={CX} cy={CY} r={R} fill="none" stroke={s.color} strokeWidth={stroke} strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={-s.off} style={{transform:"rotate(-90deg)",transformOrigin:"70px 70px"}}/>))}
                        <text x={CX} y={CY-6} textAnchor="middle" style={{fontSize:17,fontWeight:700,fill:B.ink}}>¥{(typeTotal/1000).toFixed(1)}k</text>
                        <text x={CX} y={CY+11} textAnchor="middle" style={{fontSize:9,fill:B.silver}}>支出合計</text>
                      </svg>
                      <div style={{flex:1,display:"flex",flexDirection:"column",gap:10}}>
                        {byType.map(b=>(
                          <div key={b.key}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                              <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:"50%",background:b.color,flexShrink:0}}/><span style={{fontSize:11,color:B.inkLight,fontWeight:400}}>{b.label}</span></div>
                              <span style={{fontSize:11,fontWeight:600,color:B.ink}}>¥{b.total.toLocaleString()}</span>
                            </div>
                            <div style={{height:3,background:B.line,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${(b.total/maxType)*100}%`,background:b.color,borderRadius:2,transition:"width 0.5s"}}/></div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}
              </div>

              {/* Monthly trend */}
              <div style={{background:B.surface,borderRadius:16,padding:"16px 18px",border:`1px solid ${B.line}`,boxShadow:S.xs}}>
                <div style={{fontSize:13,fontWeight:600,color:B.ink,marginBottom:4}}>6ヶ月推移</div>
                <div style={{fontSize:11,color:B.silver,marginBottom:14}}>月別支出合計</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:72}}>
                  {monthlyData.map(m=>{const h=Math.max(4,(m.v/maxMonth)*58),isCur=m.m==="4月";return(
                    <div key={m.m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                      <span style={{fontSize:9,color:isCur?B.green:"transparent",fontWeight:600}}>{isCur?`¥${(m.v/1000).toFixed(1)}k`:"·"}</span>
                      <div style={{width:"100%",borderRadius:"4px 4px 0 0",height:h,background:isCur?B.green:B.line,transition:"height 0.4s"}}/>
                      <span style={{fontSize:9,color:isCur?B.ink:B.silver,fontWeight:isCur?600:400}}>{m.m}</span>
                    </div>
                  );})}
                </div>
              </div>
            </div>
          )}

          {tab==="transactions"&&(
            <>
              {/* Filter */}
              <div style={{background:B.surface,padding:"10px 16px",borderBottom:`1px solid ${B.line}`}}>
                <div className="filter-scroll" style={{display:"flex",gap:6,overflowX:"auto"}}>
                  {[["all","すべて"],["transport","交通"],["purchase","お買い物"],["jre","ポイント"],["tappay","Tappay"]].map(([k,l])=>(
                    <button key={k} onClick={()=>setTypeF(k)} style={{padding:"8px 16px",borderRadius:24,border:"none",fontSize:13,fontWeight:500,flexShrink:0,transition:"all 0.15s",background:typeF===k?B.green:B.raised,color:typeF===k?"#fff":B.inkLight}}>{l}</button>
                  ))}
                </div>
              </div>
              {/* Transaction list */}
              <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:4}}>
                {grouped.map(([date,txns])=>(
                  <div key={date}>
                    <div style={{fontSize:11,fontWeight:500,color:B.silver,padding:"10px 2px 6px",letterSpacing:.4,textTransform:"uppercase"}}>{relDate(date)}</div>
                    <div style={{background:B.surface,borderRadius:16,overflow:"hidden",border:`1px solid ${B.line}`,boxShadow:S.xs}}>
                      {txns.map((t,i)=>{const{Icon,color,tint}=TYPE_CFG[t.type];return(
                        <div key={t.id} style={{padding:"11px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:i<txns.length-1?`1px solid ${B.line}`:"none"}}>
                          <div style={{width:40,height:40,borderRadius:12,background:tint,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon size={18} color={color} strokeWidth={1.8}/></div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:15,fontWeight:600,color:B.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.label}</div>
                            <div style={{fontSize:11,color:B.silver,marginTop:2}}>{t.time} · {t.sub}</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontSize:15,fontWeight:600,color:amtColor(t)}}>{fmtAmt(t)}</div>
                            <div style={{fontSize:11,color:B.silver,marginTop:1}}>¥{t.bal.toLocaleString()}</div>
                          </div>
                        </div>
                      );})}
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
          <CardPickerSheet open={cardSheet} onClose={()=>setCS(false)} card={card} setCard={setCard}/>
          <ExportSheet open={exportOpen} onClose={()=>setEx(false)}/>
        </div>
      );
    }

    // ─── Real Tokyo station coordinates ───────────────────────────────────────
    const STATION_COORDS = {
      Shinjuku:  [35.6896, 139.7006],
      Shibuya:   [35.6580, 139.7016],
      Ebisu:     [35.6467, 139.7101],
      Harajuku:  [35.6702, 139.7026],
      Ikebukuro: [35.7295, 139.7109],
      Ueno:      [35.7141, 139.7774],
      Tokyo:     [35.6812, 139.7671],
      Akihabara: [35.6984, 139.7731],
      Tachikawa: [35.6956, 139.4178],
    };

    // Yamanote loop (approximate, major stops)
    const YAMANOTE_LL = [
      [35.6284,139.7388],[35.6197,139.7283],[35.6330,139.7156],
      [35.6467,139.7101],[35.6580,139.7016],[35.6702,139.7026],
      [35.6896,139.7006],[35.7025,139.7006],[35.7128,139.7032],
      [35.7295,139.7109],[35.7447,139.7233],[35.7473,139.7283],
      [35.7404,139.7470],[35.7378,139.7602],[35.7278,139.7710],
      [35.7141,139.7774],[35.6984,139.7731],[35.6812,139.7671],
      [35.6654,139.7585],[35.6454,139.7459],[35.6284,139.7388],
    ];
    // Chuo line west–east
    const CHUO_LL = [
      [35.6956,139.4178],[35.6893,139.4870],[35.6978,139.5597],
      [35.7011,139.6456],[35.6896,139.7006],[35.6812,139.7671],
    ];

    // ═══════════════════════════════════════════════════════════════════════════
    // V3 — MAP VIEW (Leaflet)
    // ═══════════════════════════════════════════════════════════════════════════
    function V3() {
      const [card,setCard]        = useState(1);
      const [typeF,setTypeF]      = useState("all");
      const [selStation,setSel]   = useState(null);
      const [sheetState,setSheet] = useState("peek");
      const [exportOpen,setEx]    = useState(false);
      const [cardSheet,setCS]     = useState(false);

      const mapDivRef  = useRef(null);
      const leafletRef = useRef(null);
      const markersRef = useRef({});

      const cardData = CARDS.find(c=>c.id===card);
      const filtered = useMemo(()=>TX.filter(t=>typeF==="all"||t.type===typeF),[typeF]);
      const stationMap = useMemo(()=>{
        const m={};
        filtered.forEach(t=>{if(!m[t.station])m[t.station]=[];m[t.station].push(t);});
        return m;
      },[filtered]);

      const selTx    = selStation?(stationMap[selStation]||[]):[];
      const selSpent = Math.abs(selTx.filter(t=>t.amount<0).reduce((a,t)=>a+t.amount,0));
      const overviewGroups = groupByDate(filtered);
      const SHEET_H  = {peek:96,half:340,full:600};

      // Init Leaflet once
      useEffect(()=>{
        if (leafletRef.current || !mapDivRef.current) return;
        const L = window.L;
        const map = L.map(mapDivRef.current,{
          center:[35.685,139.700], zoom:12,
          zoomControl:false, attributionControl:false,
        });
        // CartoDB Positron — clean light tiles, no API key
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
          subdomains:"abcd", maxZoom:19,
        }).addTo(map);
        // Small attribution bottom-left
        L.control.attribution({prefix:false,position:"bottomleft"})
          .addAttribution('© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>')
          .addTo(map);
        // Train lines
        L.polyline(YAMANOTE_LL,{color:"#5BA4E8",weight:3,opacity:.75}).addTo(map);
        L.polyline(CHUO_LL,{color:"#E8803A",weight:2.5,opacity:.75}).addTo(map);
        leafletRef.current = map;
        return ()=>{ map.remove(); leafletRef.current=null; };
      },[]);

      // Rebuild markers whenever stationMap or selection changes
      useEffect(()=>{
        const map = leafletRef.current;
        if (!map) return;
        const L = window.L;
        // Remove old
        Object.values(markersRef.current).forEach(m=>m.remove());
        markersRef.current = {};

        // Inactive stations (grey dots)
        Object.entries(STATION_COORDS).filter(([n])=>!stationMap[n]).forEach(([name,ll])=>{
          const ico = L.divIcon({
            html:`<div style="width:10px;height:10px;border-radius:50%;background:#fff;border:1.5px solid #C8CDD8;box-shadow:0 1px 3px rgba(0,0,0,.12)"></div>`,
            className:"", iconSize:[10,10], iconAnchor:[5,5],
          });
          markersRef.current["_"+name] = L.marker(ll,{icon:ico,interactive:false}).addTo(map);
        });

        // Active station pins
        Object.entries(stationMap).forEach(([name,txns])=>{
          const ll = STATION_COORDS[name]; if(!ll) return;
          const isSel = selStation===name;
          const count = txns.length;
          const spent = Math.abs(txns.filter(t=>t.amount<0).reduce((a,t)=>a+t.amount,0));
          const sz = Math.min(44, 28+count*4);

          const bubble = isSel&&spent>0
            ? `<div style="position:absolute;bottom:${sz+4}px;left:50%;transform:translateX(-50%);background:${B.greenDark};color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;font-family:-apple-system,sans-serif;">¥${spent.toLocaleString()}</div>`
            : "";
          const ring = isSel
            ? `<div style="position:absolute;inset:-8px;border-radius:50%;border:2px solid ${B.green}44;"></div><div style="position:absolute;inset:-4px;border-radius:50%;border:1.5px solid ${B.green}88;"></div>`
            : "";

          const html = `<div style="position:relative;display:flex;align-items:center;justify-content:center;">
            ${ring}
            ${bubble}
            <div style="width:${sz}px;height:${sz}px;border-radius:50%;
              background:${isSel?B.green:"#fff"};
              border:${isSel?"none":`2.5px solid ${B.green}`};
              box-shadow:0 2px 10px rgba(0,0,0,.22);
              display:flex;align-items:center;justify-content:center;
              font-size:${sz>36?13:11}px;font-weight:700;
              color:${isSel?"#fff":B.green};
              font-family:-apple-system,sans-serif;
              cursor:pointer;transition:all .2s;">
              ${count}
            </div>
            <div style="position:absolute;top:${sz+4}px;left:50%;transform:translateX(-50%);
              font-size:10px;font-weight:${isSel?700:500};
              color:${isSel?B.greenDark:B.inkLight};white-space:nowrap;
              font-family:-apple-system,sans-serif;
              text-shadow:0 1px 2px rgba(255,255,255,.9);">
              ${name}
            </div>
          </div>`;

          const ico = L.divIcon({
            html, className:"", iconSize:[sz+40,sz+28], iconAnchor:[(sz+40)/2, sz/2],
          });
          const m = L.marker(ll,{icon:ico}).addTo(map);
          m.on("click",()=>tapPin(name));
          markersRef.current[name] = m;
        });
      },[stationMap, selStation]);

      function tapPin(name) { selStation===name?(setSel(null),setSheet("peek")):(setSel(name),setSheet("half")); }
      function cycleSheet() { setSheet(s=>s==="peek"?"half":s==="half"?"full":"peek"); }

      function TxRow({t,borderBottom}) {
        const {Icon,color,tint}=TYPE_CFG[t.type];
        return (
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:borderBottom?`1px solid ${B.line}`:"none"}}>
            <div style={{width:40,height:40,borderRadius:12,background:tint,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon size={18} color={color} strokeWidth={1.8}/></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:15,fontWeight:600,color:B.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.label}</div>
              <div style={{fontSize:11,color:B.silver,marginTop:2,display:"flex",alignItems:"center",gap:4}}><Clock size={10} color={B.silver}/> {t.time} · {selStation?t.sub:t.station}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:600,color:amtColor(t)}}>{fmtAmt(t)}</div>
              <div style={{fontSize:11,color:B.silver,marginTop:1}}>¥{t.bal.toLocaleString()}</div>
            </div>
          </div>
        );
      }

      return (
        <div style={{height:808,position:"relative",overflow:"hidden",background:"#E8ECF0",display:"flex",flexDirection:"column"}}>

          {/* Map — Leaflet tile map */}
          <div ref={mapDivRef} style={{position:"absolute",inset:0,zIndex:0}}/>

          {/* Floating card */}
          <div style={{position:"absolute",top:0,left:0,right:0,zIndex:30,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
            <button onClick={()=>setCS(true)} style={{background:B.surface,borderRadius:16,padding:"8px 12px",boxShadow:S.lg,display:"flex",alignItems:"center",gap:8,flex:1,border:"none",textAlign:"left"}}>
              <div style={{width:30,height:30,borderRadius:8,background:B.green,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Train size={14} color="#fff" strokeWidth={2.5}/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,color:B.silver,fontWeight:500,letterSpacing:.4}}>{cardData.name} ···{cardData.last}</div>
                <div style={{fontSize:17,fontWeight:700,color:B.ink,letterSpacing:-.5,lineHeight:1.2}}>¥{cardData.balance.toLocaleString()}</div>
              </div>
              <ChevronDown size={14} color={B.silver} strokeWidth={2}/>
            </button>
            <button onClick={()=>setEx(true)} style={{width:46,height:46,borderRadius:12,border:"none",background:exportOpen?B.green:B.surface,boxShadow:S.lg,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.18s"}}>
              <Upload size={16} color={exportOpen?"#fff":B.inkLight} strokeWidth={2}/>
            </button>
          </div>

          {/* Filter pills */}
          <div className="filter-scroll" style={{position:"absolute",top:72,left:0,right:0,zIndex:20,padding:"0 14px",display:"flex",gap:6,overflowX:"auto"}}>
            {[["all","すべて"],["transport","交通"],["purchase","お買い物"],["jre","ポイント"],["tappay","Tappay"]].map(([k,l])=>(
              <button key={k} onClick={()=>{setTypeF(k);setSel(null);setSheet("peek");}} style={{padding:"8px 16px",borderRadius:24,border:"none",fontSize:13,fontWeight:500,flexShrink:0,transition:"all 0.15s",background:typeF===k?B.green:B.surface,color:typeF===k?"#fff":B.inkLight,boxShadow:S.md}}>{l}</button>
            ))}
          </div>

          {/* Zoom controls */}
          <div style={{position:"absolute",right:14,zIndex:25,display:"flex",flexDirection:"column",gap:6,bottom:SHEET_H[sheetState]+14,transition:"bottom 0.28s cubic-bezier(0.16,1,0.3,1)"}}>
            <button onClick={()=>leafletRef.current?.zoomIn()}  style={{width:38,height:38,borderRadius:10,border:"none",background:B.surface,boxShadow:S.md,fontSize:20,fontWeight:300,color:B.ink,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
            <button onClick={()=>leafletRef.current?.zoomOut()} style={{width:38,height:38,borderRadius:10,border:"none",background:B.surface,boxShadow:S.md,fontSize:22,fontWeight:300,color:B.ink,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>−</button>
            <button onClick={()=>leafletRef.current?.setView([35.685,139.700],12)} style={{width:38,height:38,borderRadius:10,border:"none",background:B.surface,boxShadow:S.md,fontSize:11,fontWeight:600,color:B.inkLight,display:"flex",alignItems:"center",justifyContent:"center"}}>⊙</button>
          </div>

          {/* Bottom sheet */}
          <div style={{position:"absolute",bottom:0,left:0,right:0,zIndex:20,background:B.surface,borderRadius:"24px 24px 0 0",boxShadow:"0 -4px 24px rgba(0,0,0,.12)",height:SHEET_H[sheetState],transition:"height 0.28s cubic-bezier(0.16,1,0.3,1)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div onClick={cycleSheet} style={{padding:"10px 16px 0",cursor:"pointer",flexShrink:0}}>
              <div style={{width:36,height:4,borderRadius:2,background:B.line,margin:"0 auto 10px"}}/>
              {selStation?(
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:10,borderBottom:`1px solid ${B.line}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:36,height:36,borderRadius:12,background:B.greenTint,display:"flex",alignItems:"center",justifyContent:"center"}}><MapPin size={16} color={B.green} strokeWidth={2}/></div>
                    <div>
                      <div style={{fontSize:15,fontWeight:700,color:B.ink,letterSpacing:-.3}}>{selStation}</div>
                      <div style={{fontSize:11,color:B.silver,marginTop:1}}>{selTx.length}件{selSpent>0?` · ¥${selSpent.toLocaleString()} 利用`:""}</div>
                    </div>
                  </div>
                  <button onClick={e=>{e.stopPropagation();setSel(null);setSheet("peek");}} style={{width:28,height:28,borderRadius:"50%",background:B.raised,border:"none",display:"flex",alignItems:"center",justifyContent:"center"}}><X size={13} color={B.inkLight} strokeWidth={2.5}/></button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:10,borderBottom:`1px solid ${B.line}`}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:B.ink,letterSpacing:-.3}}>{Object.keys(stationMap).length}駅を利用</div>
                    <div style={{fontSize:11,color:B.silver,marginTop:1}}>{filtered.length}件 · 2026年4月</div>
                  </div>
                  <ChevronUp size={18} color={B.silver} strokeWidth={2} style={{transform:sheetState==="full"?"rotate(180deg)":"none",transition:"transform 0.28s"}}/>
                </div>
              )}
            </div>

            <div style={{flex:1,overflowY:sheetState==="peek"?"hidden":"auto",padding:"0 16px 24px"}}>
              {sheetState==="peek"&&(
                <div style={{padding:"10px 0 0",display:"flex",gap:8}}>
                  {Object.entries(stationMap).slice(0,4).map(([name,txns])=>(
                    <button key={name} onClick={()=>tapPin(name)} style={{flex:1,padding:"7px 6px",borderRadius:8,border:`1px solid ${B.line}`,background:B.surface,textAlign:"center",boxShadow:S.xs}}>
                      <div style={{fontSize:11,fontWeight:600,color:B.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                      <div style={{fontSize:11,color:B.silver,marginTop:2}}>{txns.length}件</div>
                    </button>
                  ))}
                </div>
              )}
              {sheetState!=="peek"&&selStation&&(
                <div style={{marginTop:12}}>
                  {groupByDate(selTx).map(([date,txns])=>(
                    <div key={date}>
                      <div style={{fontSize:11,fontWeight:500,color:B.silver,padding:"10px 0 6px",letterSpacing:.4,textTransform:"uppercase"}}>{relDate(date)}</div>
                      {txns.map((t,i)=><TxRow key={t.id} t={t} borderBottom={i<txns.length-1}/>)}
                    </div>
                  ))}
                </div>
              )}
              {sheetState!=="peek"&&!selStation&&(
                <>
                  <div style={{fontSize:11,fontWeight:500,color:B.silver,letterSpacing:.4,marginTop:12,marginBottom:8,textTransform:"uppercase"}}>すべての取引</div>
                  {overviewGroups.map(([date,txns])=>(
                    <div key={date}>
                      <div style={{fontSize:11,color:B.silver,padding:"8px 0 4px",fontWeight:500}}>{relDate(date)}</div>
                      {txns.map((t,i)=><TxRow key={t.id} t={t} borderBottom={i<txns.length-1}/>)}
                    </div>
                  ))}
                </>
              )}
            </div>
          </div>
          <CardPickerSheet open={cardSheet} onClose={()=>setCS(false)} card={card} setCard={setCard}/>
          <ExportSheet open={exportOpen} onClose={()=>setEx(false)}/>
        </div>
      );
    }

    createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
