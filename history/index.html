<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suica — 履歴</title>
  <link rel="stylesheet" href="../shared/base.css" />
  <link rel="stylesheet" href="../shared/components.css" />
  <link rel="stylesheet" href="history.css" />
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="screen-header">
    <div class="toolbar">
      <button class="back-btn" onclick="history.back()">
        <img src="../../Icons/back.svg" alt="戻る" />
      </button>
      <span class="toolbar-title">Activity history</span>
      <button class="search-btn" onclick="toggleSearch()">
        <img src="../../Icons/search.svg" alt="検索" />
      </button>
    </div>
    <div class="search-bar" id="searchBar" style="display:none">
      <img src="../../Icons/search.svg" class="search-bar__icon" alt="" />
      <input class="search-bar__input" type="search" placeholder="Search" oninput="onSearch(this.value)" />
    </div>
    <div class="filter-chips">
      <button class="filter-chip filter-chip--card" id="cardChip" onclick="openCardSheet()">
        <div class="chip-card-thumb" id="chipCardThumb"></div>
        <span id="cardChipLabel">Work</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="filter-chip" id="dateChip" onclick="openSheet()">
        <span id="dateChipLabel">Last 30 days</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="filter-chip" id="catChip" onclick="openCatSheet()">
        <span id="catChipLabel">All</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Transaction list -->
  <div class="tx-list" id="txList"></div>

</div>

<!-- Sheet overlay -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeAllSheets()"></div>

<!-- Date filter bottom sheet -->
<div class="filter-sheet" id="filterSheet">
  <div class="filter-sheet__handle"></div>
  <div class="filter-sheet__title">期間を選択</div>

  <div class="filter-sheet__section">
    <div class="filter-sheet__section-label">クイック選択</div>
    <div class="preset-chips">
      <button class="preset-chip" data-preset="week"   onclick="selectPreset(this)">今週</button>
      <button class="preset-chip" data-preset="month"  onclick="selectPreset(this)">今月</button>
      <button class="preset-chip" data-preset="3month" onclick="selectPreset(this)">3ヶ月</button>
    </div>
  </div>

  <div class="filter-sheet__section">
    <div class="filter-sheet__section-label">カスタム期間</div>
    <div class="custom-range">
      <input type="date" class="custom-range__input" id="dateFrom" onchange="onCustomDate()" />
      <span class="custom-range__sep">〜</span>
      <input type="date" class="custom-range__input" id="dateTo"   onchange="onCustomDate()" />
    </div>
  </div>

  <div class="filter-sheet__actions">
    <button class="btn btn-secondary" onclick="clearDateFilter(); closeAllSheets()">クリア</button>
    <button class="btn btn-primary"   onclick="applyFilter()">適用</button>
  </div>

</div>

<!-- Card selector bottom sheet -->
<div class="filter-sheet" id="cardSheet">
  <div class="filter-sheet__handle"></div>
  <div class="card-sheet-header">
    <button class="card-sheet-close" onclick="closeAllSheets()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <span class="card-sheet-title">Card</span>
  </div>
  <div class="card-list" id="cardList"></div>
  <button class="card-apply-btn" onclick="applyCard()">Apply</button>
</div>

<!-- Category filter bottom sheet -->
<div class="filter-sheet" id="catSheet">
  <div class="filter-sheet__handle"></div>
  <div class="filter-sheet__title">Category</div>
  <div class="preset-chips cat-chips">
    <button class="preset-chip active" data-cat="all"    onclick="selectCat(this)">All</button>
    <button class="preset-chip"        data-cat="rail"   onclick="selectCat(this)">Transit</button>
    <button class="preset-chip"        data-cat="bus"    onclick="selectCat(this)">Bus</button>
    <button class="preset-chip"        data-cat="emoney" onclick="selectCat(this)">Shopping</button>
    <button class="preset-chip"        data-cat="charge" onclick="selectCat(this)">Charge</button>
    <button class="preset-chip"        data-cat="points" onclick="selectCat(this)">Points</button>
    <button class="preset-chip"        data-cat="pass"   onclick="selectCat(this)">Pass</button>
  </div>
</div>

/* ─── Cards ───────────────────────────────────── */
const CARDS = [
  {
    id: 'work',
    label: '仕事用',
    chipLabel: 'Work',
    number: 'AA123 4567 8901 2345',
    gradient: 'linear-gradient(135deg, #004d24 0%, #00833e 55%, #5cb882 100%)',
  },
  {
    id: 'private',
    label: 'プライベート用',
    chipLabel: 'Private',
    number: 'BB987 6543 2109 8765',
    gradient: 'linear-gradient(135deg, #b06090 0%, #d888b8 55%, #f0bce0 100%)',
  },
];

/* ─── State ───────────────────────────────────── */
let activeChip   = 'all';
let searchQuery  = '';
let dateFrom     = null;
let dateTo       = null;
let pendingFrom  = null;
let pendingTo    = null;
let selectedCard = 'work';
let pendingCard  = 'work';
const TODAY      = '2026-03-27';

/* ─── Icon map ────────────────────────────────── */
const ICONS = {
  subway:  '<img src="../../Icons/directions_subway.svg" alt="" />',
  bus:     '<img src="../../Icons/directions_bus.svg" alt="" />',
  spend:   '<img src="../../Icons/spend.svg" alt="" />',
  savings: '<img src="../../Icons/savings.svg" alt="" />',
  commute: '<img src="../../Icons/commute.svg" alt="" />',
};

/* ─── Type config ─────────────────────────────── */
const TYPE_CONFIG = {
  rail:              { icon: ICONS.subway,  cls: 'rail' },
  bus:               { icon: ICONS.bus,     cls: 'bus' },
  emoney:            { icon: ICONS.spend,   cls: 'emoney' },
  charge:            { icon: ICONS.savings, cls: 'charge' },
  shinkansen:        { icon: ICONS.subway,  cls: 'shinkansen' },
  commuter_pass:     { icon: ICONS.commute, cls: 'commuter' },
  green_car:         { icon: ICONS.subway,  cls: 'green-car' },
  coupon:            { icon: ICONS.spend,   cls: 'coupon' },
  points_redemption: { icon: ICONS.savings, cls: 'points-redem' },
};

/* ─── Category map ────────────────────────────── */
const CAT_MAP = {
  rail:   ['rail', 'shinkansen'],
  bus:    ['bus'],
  emoney: ['emoney'],
  charge: ['charge'],
  points: ['coupon', 'points_redemption'],
  pass:   ['commuter_pass', 'green_car'],
};

const CAT_LABELS = { all: 'All', rail: 'Transit', bus: 'Bus', emoney: 'Shopping', charge: 'Charge', points: 'Points', pass: 'Pass' };

/* ─── Work card transaction set ───────────────── */
// Work card (仕事用): commute trips, pass renewals, work-area purchases
// Private card (プライベート用): leisure, shopping, dining, entertainment
const WORK_TX_IDS = new Set([
  'tx_20260327_001', 'tx_20260327_003',               // commute Mon
  'tx_20260326_001', 'tx_20260326_002', 'tx_20260326_003', // commute Wed + NewDays lunch
  'tx_20260318_001', 'tx_20260318_002',               // pass renewal + auto charge
  'tx_20260216_001',                                  // pass renewal
  'tx_20251215_002',                                  // pass renewal
  'tx_20251205_001',                                  // commute Fri
  'tx_20251117_001',                                  // pass renewal
  'tx_20251031_001',                                  // commute (Halloween)
  'tx_20251017_001',                                  // pass purchase (new)
  'tx_20251010_001', 'tx_20251010_002', 'tx_20251010_003', // commute + Becker's lunch
]);

/* ─── Card chip ───────────────────────────────── */
function renderChipCardThumb(cardId) {
  const card = CARDS.find(c => c.id === cardId) || CARDS[0];
  const el = document.getElementById('chipCardThumb');
  if (el) el.style.background = card.gradient;
}

function openCardSheet() {
  pendingCard = selectedCard;
  renderCardList();
  document.getElementById('sheetOverlay').classList.add('visible');
  document.getElementById('cardSheet').classList.add('visible');
}

function renderCardList() {
  const list = document.getElementById('cardList');
  list.innerHTML = CARDS.map(card => `
    <div class="card-item${card.id === pendingCard ? ' selected' : ''}" onclick="selectPendingCard('${card.id}')">
      <div class="card-item__left">
        <div class="card-thumb" style="background:${card.gradient}"></div>
        <div class="card-info">
          <div class="card-info__label">${card.label}</div>
          <div class="card-info__number">${card.number}</div>
        </div>
      </div>
      <svg class="card-check" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="var(--brand-default)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `).join('');
}

function selectPendingCard(id) {
  pendingCard = id;
  renderCardList();
}

function applyCard() {
  selectedCard = pendingCard;
  const card = CARDS.find(c => c.id === selectedCard) || CARDS[0];
  document.getElementById('cardChipLabel').textContent = card.chipLabel;
  renderChipCardThumb(selectedCard);
  closeAllSheets();
  render();
}

/* ─── Category chip ───────────────────────────── */
function openCatSheet() {
  document.querySelectorAll('.cat-chips .preset-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === activeChip);
  });
  document.getElementById('sheetOverlay').classList.add('visible');
  document.getElementById('catSheet').classList.add('visible');
}

function selectCat(el) {
  activeChip = el.dataset.cat;
  document.getElementById('catChipLabel').textContent = CAT_LABELS[activeChip] || 'All';
  closeAllSheets();
  render();
}

/* ─── Search ──────────────────────────────────── */
function toggleSearch() {
  const bar = document.getElementById('searchBar');
  if (bar.style.display === 'none') {
    bar.style.display = '';
    bar.querySelector('input').focus();
  } else {
    bar.style.display = 'none';
    onSearch('');
    bar.querySelector('input').value = '';
  }
}

function onSearch(val) {
  searchQuery = val.trim();
  render();
}

/* ─── Date filter sheet ───────────────────────── */
function openSheet() {
  pendingFrom = dateFrom;
  pendingTo   = dateTo;
  document.getElementById('dateFrom').value = pendingFrom || '';
  document.getElementById('dateTo').value   = pendingTo   || '';
  document.querySelectorAll('#filterSheet .preset-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('sheetOverlay').classList.add('visible');
  document.getElementById('filterSheet').classList.add('visible');
}

function closeAllSheets() {
  document.getElementById('sheetOverlay').classList.remove('visible');
  document.getElementById('filterSheet').classList.remove('visible');
  document.getElementById('catSheet').classList.remove('visible');
  document.getElementById('cardSheet').classList.remove('visible');
}

function selectPreset(el) {
  document.querySelectorAll('#filterSheet .preset-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const today = new Date(TODAY);
  const fmt = d => d.toISOString().slice(0, 10);
  if (el.dataset.preset === 'week') {
    const mon = new Date(today); mon.setDate(today.getDate() - today.getDay() + 1);
    pendingFrom = fmt(mon); pendingTo = TODAY;
  } else if (el.dataset.preset === 'month') {
    pendingFrom = TODAY.slice(0, 7) + '-01'; pendingTo = TODAY;
  } else {
    const d = new Date(today); d.setMonth(d.getMonth() - 3);
    pendingFrom = fmt(d); pendingTo = TODAY;
  }
  document.getElementById('dateFrom').value = pendingFrom;
  document.getElementById('dateTo').value   = pendingTo;
}

function onCustomDate() {
  document.querySelectorAll('#filterSheet .preset-chip').forEach(c => c.classList.remove('active'));
  pendingFrom = document.getElementById('dateFrom').value || null;
  pendingTo   = document.getElementById('dateTo').value   || null;
}

function applyFilter() {
  dateFrom = pendingFrom;
  dateTo   = pendingTo;
  const label = document.getElementById('dateChipLabel');
  if (!dateFrom && !dateTo) {
    label.textContent = 'All time';
  } else {
    const activePreset = document.querySelector('#filterSheet .preset-chip.active');
    if (activePreset) {
      const presetLabels = { week: 'This week', month: 'This month', '3month': 'Last 3 months' };
      label.textContent = presetLabels[activePreset.dataset.preset] || 'Custom';
    } else {
      label.textContent = 'Custom range';
    }
  }
  closeAllSheets();
  render();
}

function clearDateFilter() {
  dateFrom = dateTo = pendingFrom = pendingTo = null;
  document.getElementById('dateChipLabel').textContent = 'Last 30 days';
}

/* ─── Transaction helpers ─────────────────────── */
function getTxTitle(tx) {
  if ((tx.type === 'rail' || tx.type === 'shinkansen') && tx.destination) return tx.destination;
  if (tx.type === 'charge') return 'Charge';
  if (tx.type === 'points_redemption') return 'Suicaチャージ';
  if (tx.type === 'bus') return tx.operator || 'Bus';
  if (tx.type === 'commuter_pass') return 'Commuter pass';
  if (tx.type === 'green_car') return 'Green car';
  if (tx.type === 'coupon') return tx.coupon_name || tx.label;
  if (tx.merchant) return tx.merchant;
  return tx.label;
}

function getTxSubtitle(tx) {
  if ((tx.type === 'rail' || tx.type === 'shinkansen') && tx.origin) return `From ${tx.origin}`;
  if (tx.type === 'green_car' && tx.origin) return `From ${tx.origin}`;
  if (tx.type === 'bus' && tx.origin) return `${tx.origin} → ${tx.destination}`;
  if (tx.type === 'charge' && tx.method === 'view_card_auto') return 'オートチャージ';
  if (tx.type === 'points_redemption') return 'JRE ポイント交換';
  if (tx.type === 'commuter_pass' && tx.route_from) return `${tx.route_from} → ${tx.route_to}`;
  return '';
}

/* ─── Helpers ─────────────────────────────────── */
function formatDateHeader(dateStr) {
  const today = new Date(TODAY + 'T00:00:00');
  const yest  = new Date(today); yest.setDate(today.getDate() - 1);
  if (dateStr === TODAY) return 'Today';
  if (dateStr === yest.toISOString().slice(0, 10)) return 'Yesterday';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}

function formatAmount(tx) {
  if (tx.type === 'points_redemption' || tx.amount > 0)
    return { text: `+¥${tx.amount.toLocaleString()}`, cls: 'tx-amount--credit' };
  if (tx.amount === 0) {
    if (tx.covered_by_pass) return { text: 'Pass', cls: 'tx-amount--zero' };
    return { text: '¥0', cls: 'tx-amount--zero' };
  }
  return { text: `¥${Math.abs(tx.amount).toLocaleString()}`, cls: 'tx-amount--debit' };
}

/* ─── Render ──────────────────────────────────── */
function render() {
  let txs = DATA.transactions;
  // Filter by selected card
  txs = txs.filter(t => WORK_TX_IDS.has(t.id) ? selectedCard === 'work' : selectedCard === 'private');
  if (activeChip !== 'all') {
    const allowed = CAT_MAP[activeChip] || [];
    txs = txs.filter(t => allowed.includes(t.type));
  }
  if (dateFrom) txs = txs.filter(t => t.date >= dateFrom);
  if (dateTo)   txs = txs.filter(t => t.date <= dateTo);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    txs = txs.filter(t => t.label.toLowerCase().includes(q));
  }

  const list = document.getElementById('txList');

  if (!txs.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state__icon"><img src="../../Icons/search.svg" alt="" /></div><div>No matching transactions</div></div>`;
    return;
  }

  const groups = {};
  txs.forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  });

  let html = '';
  Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(date => {
    html += `<div class="date-header">${formatDateHeader(date)}</div>`;
    groups[date].forEach(tx => {
      const cfg   = TYPE_CONFIG[tx.type] || { icon: ICONS.spend, cls: 'emoney' };
      const amt   = formatAmount(tx);
      const title = getTxTitle(tx);
      const sub   = getTxSubtitle(tx);
      html += `<div class="tx-row">
        <div class="tx-icon tx-icon--${cfg.cls}">${cfg.icon}</div>
        <div class="tx-body">
          <div class="tx-label">${title}</div>
          ${sub ? `<div class="tx-sub">${sub}</div>` : ''}
          <div class="tx-meta">${tx.time}</div>
        </div>
        <div class="tx-amount ${amt.cls}">${amt.text}</div>
      </div>`;
    });
  });

  list.innerHTML = html;
}

render();
renderChipCardThumb(selectedCard);
</script>
